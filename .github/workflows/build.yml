name: Build Mesa llvmpipe (opengl32.dll for Windows ARM64)

# Manual trigger, with the Mesa git ref as an input so you can pin a version.
on:
  workflow_dispatch:
    inputs:
      mesa_ref:
        description: 'Mesa git ref to build (tag, branch, or commit)'
        required: false
        default: 'mesa-25.2.0'
  # Uncomment to also build on every push to main:
  # push:
  #   branches: [ main ]

jobs:
  build-llvmpipe:
    runs-on: ubuntu-22.04

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            build-essential \
            pkg-config \
            meson \
            ninja-build \
            python3 \
            python3-pip \
            mingw-w64 \
            mingw-w64-tools \
            gcc-mingw-w64-aarch64 \
            g++-mingw-w64-aarch64 \
            binutils-mingw-w64-aarch64 \
            flex \
            bison \
            llvm-dev \
            libclang-dev

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools packaging mako

      - name: Clone Mesa
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.mesa_ref || 'mesa-25.2.0' }}" \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa-src

      # Create a cross-compilation file for Meson targeting ARM64 Windows
      - name: Create Meson cross-file
        run: |
          cat > /tmp/cross-mingw-aarch64.txt << 'EOF'
          [properties]
          c_args = ['-D_WIN32_WINNT=0x0601']
          cpp_args = ['-D_WIN32_WINNT=0x0601']
          c_link_args = []
          cpp_link_args = []
          
          [binaries]
          c = 'aarch64-w64-mingw32-gcc'
          cpp = 'aarch64-w64-mingw32-g++'
          ar = 'aarch64-w64-mingw32-ar'
          strip = 'aarch64-w64-mingw32-strip'
          pkgconfig = 'pkg-config'
          
          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF

      # Minimal, version-stable option set: just llvmpipe, no window-system
      # platforms that don't apply, and no Vulkan drivers.
      - name: Configure (Meson) for ARM64 Windows
        working-directory: mesa-src
        run: |
          meson setup build \
            --cross-file=/tmp/cross-mingw-aarch64.txt \
            --prefix=/ \
            --buildtype=release \
            -Dplatforms=windows \
            -Dgallium-drivers=llvmpipe \
            -Dvulkan-drivers= \
            -Dglx=disabled \
            -Dosmesa=true

      - name: Build
        working-directory: mesa-src
        run: ninja -C build

      - name: Install to staging directory
        working-directory: mesa-src
        run: DESTDIR="${GITHUB_WORKSPACE}/dist" ninja -C build install

      # Collect the DLL files
      - name: Collect artifacts
        run: |
          mkdir -p artifact
          # Find and copy opengl32.dll and libgallium_wgl.dll
          find dist -iname "opengl32.dll" -o -iname "libgallium_wgl.dll" -o -iname "*.dll" | while read f; do
            cp -v "$f" artifact/ 2>/dev/null || true
          done
          ls -la artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-llvmpipe-windows-arm64
          path: artifact/*
          if-no-files-found: error
